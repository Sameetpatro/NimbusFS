name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: distributed-storage

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: distributed-storage/go.mod
          cache-dependency-path: distributed-storage/go.sum
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - run: make proto
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./tests/unit/... -count=1
      - run: go test -race ./tests/unit/... -count=1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: distributed-storage/go.mod
          cache-dependency-path: distributed-storage/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: distributed-storage

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: distributed-storage/go.mod
          cache-dependency-path: distributed-storage/go.sum
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - run: make proto
      - run: go test ./tests/integration/... -count=1 -tags=integration -timeout=10m
