services:
  master:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.master
    container_name: dfs-master
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      MASTER_HOST: "0.0.0.0"
      MASTER_DATA_DIR: "/data/master"
      LOG_LEVEL: "info"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - master-data:/data/master
      - master-certs:/data/certs
    networks:
      - dfs-net
    restart: unless-stopped

  storage-1:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.storage
    container_name: dfs-storage-1
    command: ["/bin/storage", "-config", "/etc/nimbusfs/config.yaml", "-grpc-port", "9091"]
    ports:
      - "9091:9091"
    environment:
      NODE_ID: "storage-node-1"
      STORAGE_DATA_DIR: "/data/storage"
      METRICS_PORT: "9101"
      MASTER_GRPC_ADDR: "master:9090"
      STORAGE_GRPC_ADDR: "storage-1:9091"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - storage-1-data:/data/storage
      - storage-1-certs:/data/certs
    networks:
      - dfs-net
    depends_on:
      - master
    restart: unless-stopped

  storage-2:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.storage
    container_name: dfs-storage-2
    command: ["/bin/storage", "-config", "/etc/nimbusfs/config.yaml", "-grpc-port", "9091"]
    ports:
      - "9092:9091"
    environment:
      NODE_ID: "storage-node-2"
      STORAGE_DATA_DIR: "/data/storage"
      METRICS_PORT: "9102"
      MASTER_GRPC_ADDR: "master:9090"
      STORAGE_GRPC_ADDR: "storage-2:9091"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - storage-2-data:/data/storage
      - storage-2-certs:/data/certs
    networks:
      - dfs-net
    depends_on:
      - master
    restart: unless-stopped

  storage-3:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.storage
    container_name: dfs-storage-3
    command: ["/bin/storage", "-config", "/etc/nimbusfs/config.yaml", "-grpc-port", "9091"]
    ports:
      - "9093:9091"
    environment:
      NODE_ID: "storage-node-3"
      STORAGE_DATA_DIR: "/data/storage"
      METRICS_PORT: "9103"
      MASTER_GRPC_ADDR: "master:9090"
      STORAGE_GRPC_ADDR: "storage-3:9091"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - storage-3-data:/data/storage
      - storage-3-certs:/data/certs
    networks:
      - dfs-net
    depends_on:
      - master
    restart: unless-stopped

  storage-4:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.storage
    container_name: dfs-storage-4
    command: ["/bin/storage", "-config", "/etc/nimbusfs/config.yaml", "-grpc-port", "9091"]
    ports:
      - "9094:9091"
    environment:
      NODE_ID: "storage-node-4"
      STORAGE_DATA_DIR: "/data/storage"
      METRICS_PORT: "9104"
      MASTER_GRPC_ADDR: "master:9090"
      STORAGE_GRPC_ADDR: "storage-4:9091"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - storage-4-data:/data/storage
      - storage-4-certs:/data/certs
    networks:
      - dfs-net
    depends_on:
      - master
    restart: unless-stopped

  storage-5:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.storage
    container_name: dfs-storage-5
    command: ["/bin/storage", "-config", "/etc/nimbusfs/config.yaml", "-grpc-port", "9091"]
    ports:
      - "9095:9091"
    environment:
      NODE_ID: "storage-node-5"
      STORAGE_DATA_DIR: "/data/storage"
      METRICS_PORT: "9105"
      MASTER_GRPC_ADDR: "master:9090"
      STORAGE_GRPC_ADDR: "storage-5:9091"
      TLS_ENABLED: "true"
      TLS_CERT_FILE: "/data/certs/server.pem"
      TLS_KEY_FILE: "/data/certs/server.key"
    volumes:
      - storage-5-data:/data/storage
      - storage-5-certs:/data/certs
    networks:
      - dfs-net
    depends_on:
      - master
    restart: unless-stopped

  client:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.client
    container_name: dfs-client
    profiles:
      - tools
    environment:
      MASTER_HOST: "master"
      MASTER_PORT: "8080"
    networks:
      - dfs-net
    depends_on:
      - master
    entrypoint: ["/bin/client"]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dfs-prometheus
    ports:
      - "9099:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - dfs-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: dfs-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards-json/nimbusfs.json:ro
    networks:
      - dfs-net
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  dfs-net:
    driver: bridge

volumes:
  master-data:
  master-certs:
  storage-1-data:
  storage-1-certs:
  storage-2-data:
  storage-2-certs:
  storage-3-data:
  storage-3-certs:
  storage-4-data:
  storage-4-certs:
  storage-5-data:
  storage-5-certs:
  prometheus-data:
  grafana-data:
