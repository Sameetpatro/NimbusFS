syntax = "proto3";

package master.v1;

option go_package = "github.com/Sameetpatro/NimbusFS/distributed-storage/proto/gen/master/v1;masterv1";

// MasterService is what storage nodes call on master for registration and reporting.
service MasterService {
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc ReportChunkStored(ReportChunkStoredRequest) returns (ReportChunkStoredResponse);
}

// RegisterNodeRequest is sent when a storage node starts and needs a stable identity.
message RegisterNodeRequest {
  string node_id = 1;
  string address = 2;
  int64 total_space = 3;
}

message RegisterNodeResponse {
  string assigned_node_id = 1;
  bool accepted = 2;
  string message = 3;
}

// ReportChunkStoredRequest tells master a replica landed so metadata can be updated.
message ReportChunkStoredRequest {
  string node_id = 1;
  string file_id = 2;
  string chunk_id = 3;
  int32 index = 4;
  int64 size = 5;
}

message ReportChunkStoredResponse {
  bool acknowledged = 1;
}
