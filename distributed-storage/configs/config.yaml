master:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 9090
  data_dir: "/data/master"

storage:
  replication_factor: 3
  chunk_size_mb: 4
  data_dir: "/data/storage"

node:
  heartbeat_interval: 5
  dead_threshold: 15
  node_id: ""

auth:
  jwt_secret: "change-me-in-production"
  api_key_header: "X-API-Key"

observability:
  metrics_port: 9091
  log_level: "info"
